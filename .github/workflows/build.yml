name: Build and Release CCD Tunnel Helper

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build on macOS
    runs-on: macos-latest

    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Generate version
        id: set_version
        run: |
          DATE=$(date +'%Y%m%d')
          VERSION="1.0.0-build.${DATE}.${{ github.run_number }}"
          echo "BUILD_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Build version: $VERSION"

      - name: Build all installers and publish
        run: |
          npx electron-builder --mac --win --linux \
            --publish always \
            -c.extraMetadata.version=$BUILD_VERSION
        shell: bash
