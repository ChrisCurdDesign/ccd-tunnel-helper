name: Verify Build

on:
  push:
    branches: [main]
    paths-ignore:
      - 'package.json'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Verify Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build project (Dry Run)
        shell: bash
        # We build without publishing just to ensure compilation works
        run: npx electron-builder --publish never

