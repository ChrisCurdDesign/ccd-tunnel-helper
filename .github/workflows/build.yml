name: Build CCD Tunnel Helper

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  set-version:
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.set.outputs.build_version }}
      tag_name: ${{ steps.set.outputs.tag_name }}
    steps:
      - name: Generate version
        id: set
        run: |
          DATE=$(date +'%Y%m%d')
          BUILD_VERSION="1.0.0+build.${DATE}.${{ github.run_number }}"
          TAG_NAME="v1.0.0-build.${DATE}.${{ github.run_number }}"
          echo "build_version=$BUILD_VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

  build:
    name: Build on ${{ matrix.os }}
    needs: set-version
    runs-on: ${{ matrix.os }}
    env:
      BUILD_VERSION: ${{ needs.set-version.outputs.build_version }}
      TAG_NAME: ${{ needs.set-version.outputs.tag_name }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build -- -c.extraMetadata.version=$BUILD_VERSION --publish never
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb

  tag-and-release:
    name: Finalize GitHub Release
    runs-on: ubuntu-latest
    needs: [set-version, build]
    if: github.ref == 'refs/heads/main'
    env:
      BUILD_VERSION: ${{ needs.set-version.outputs.build_version }}
      TAG_NAME: ${{ needs.set-version.outputs.tag_name }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Create and push tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag $TAG_NAME
          git push origin $TAG_NAME

      - name: Create GitHub release (draft)
        run: |
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/releases \
            -d @- <<EOF
          {
            "tag_name": "$TAG_NAME",
            "name": "$TAG_NAME",
            "body": "Automated release for build $BUILD_VERSION",
            "draft": true,
            "prerelease": false
          }
          EOF

      - name: Download artifacts from matrix builds
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach installers to release
        run: |
          for i in {1..5}; do
            release_id=$(curl -s \
              -H "Authorization: token $GH_TOKEN" \
              https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG_NAME \
              | jq -r .id)

            if [ "$release_id" != "null" ]; then
              echo "✅ Found release ID: $release_id"
              break
            fi

            echo "⏳ Waiting for release to appear (attempt $i)..."
            sleep 2
          done

          if [ "$release_id" = "null" ]; then
            echo "❌ Failed to locate release ID for tag $TAG_NAME after 5 attempts"
            exit 1
          fi

          echo "📝 Attaching files to release $TAG_NAME"

          for file in $(find artifacts -type f \( -iname "*.exe" -o -iname "*.dmg" -o -iname "*.AppImage" -o -iname "*.deb" \)); do
            filename=$(basename "$file")
            echo "🔄 Checking for $filename"
            exists=$(curl -s \
              -H "Authorization: token $GH_TOKEN" \
              https://api.github.com/repos/${{ github.repository }}/releases/$release_id/assets \
              | jq -r --arg name "$filename" '.[] | select(.name == $name) | .id')

            if [ -n "$exists" ]; then
              echo "⚠️ $filename already exists, skipping"
              continue
            fi

            echo "⬆️ Uploading $filename"
            curl -s --data-binary @"$file" \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              "https://uploads.github.com/repos/${{ github.repository }}/releases/$release_id/assets?name=$filename"
          done

      - name: Publish the GitHub release
        run: |
          release_id=$(curl -s \
            -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG_NAME \
            | jq -r .id)

          echo "🚀 Publishing release $TAG_NAME..."
          curl -s -X PATCH \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"draft":false}' \
            https://api.github.com/repos/${{ github.repository }}/releases/$release_id
