name: Build and Release CCD Tunnel Helper

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Get version from package.json
        id: package_version
        shell: bash
        run: echo "version=$(node -p 'require(\'./package.json\').version')" >> $GITHUB_OUTPUT

      - name: Generate version
        id: version
        shell: bash
        run: |
          DATE=$(date +"%Y%m%d")
          VERSION="${{ steps.package_version.outputs.version }}-build.${DATE}.${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build project
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: npx electron-builder --publish never -c.extraMetadata.version="$BUILD_VERSION"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage

  create-release:
    name: Create Draft GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release (draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v$VERSION"

          echo "Creating release for $TAG"

          FILES=$(find artifacts -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' \))
          echo "Found files:"
          echo "$FILES"

          echo "$FILES" | xargs gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "CCD Tunnel Helper $VERSION" \
            --notes "Automated draft release for $VERSION" \
            --draft

