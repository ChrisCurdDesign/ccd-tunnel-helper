name: Build CCD Tunnel Helper

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  set-version:
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.set.outputs.build_version }}
    steps:
      - name: Generate version
        id: set
        run: |
          DATE=$(date +'%Y%m%d')
          VERSION="1.0.0+build.${DATE}.${{ github.run_number }}"
          echo "build_version=$VERSION" >> $GITHUB_OUTPUT

  build:
    name: Build on ${{ matrix.os }}
    needs: set-version
    runs-on: ${{ matrix.os }}
    env:
      BUILD_VERSION: ${{ needs.set-version.outputs.build_version }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Create and push tag
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag v${{ env.BUILD_VERSION }}
          git push origin v${{ env.BUILD_VERSION }}


      - name: Build app
        run: npm run build -- -c.extraMetadata.version=$BUILD_VERSION --publish always
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: dist/
  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [set-version, build]
    if: github.ref == 'refs/heads/main'
    env:
      BUILD_VERSION: ${{ needs.set-version.outputs.build_version }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Publish release
        run: |
          echo "Publishing GitHub release for tag v$BUILD_VERSION"
          release_id=$(curl -s \
            -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/v$BUILD_VERSION \
            | jq -r .id)

          if [ "$release_id" = "null" ]; then
            echo "❌ No draft release found for tag v$BUILD_VERSION"
            exit 1
          fi

          curl -s \
            -X PATCH \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"draft":false,"prerelease":false}' \
            https://api.github.com/repos/${{ github.repository }}/releases/$release_id

          echo "✅ Published release for tag v$BUILD_VERSION"
