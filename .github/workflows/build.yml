name: Build CCD Tunnel Helper

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  set-version:
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.set.outputs.build_version }}
    steps:
      - name: Generate version
        id: set
        run: |
          DATE=$(date +'%Y%m%d')
          VERSION="1.0.0+build.${DATE}.${{ github.run_number }}"
          echo "build_version=$VERSION" >> $GITHUB_OUTPUT

  build:
    name: Build on ${{ matrix.os }}
    needs: set-version
    runs-on: ${{ matrix.os }}
    env:
      BUILD_VERSION: ${{ needs.set-version.outputs.build_version }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build -- -c.extraMetadata.version=$BUILD_VERSION --publish always
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: dist/

  tag-release:
    name: Tag build
    runs-on: ubuntu-latest
    needs: [set-version, build]
    if: github.ref == 'refs/heads/main'
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      BUILD_VERSION: ${{ needs.set-version.outputs.build_version }}
    steps:
      - uses: actions/checkout@v3

      - name: Create and push tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag v$BUILD_VERSION
          git push origin v$BUILD_VERSION

      - name: Optionally publish release manually (draft)
        run: |
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/releases \
            -d @- <<EOF
          {
            "tag_name": "v$BUILD_VERSION",
            "name": "v$BUILD_VERSION",
            "body": "Automated release for build $BUILD_VERSION",
            "draft": true,
            "prerelease": false
          }
          EOF
